<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week 1 핵심 요약 — 에이전트와 일하기</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #1f2328;
      --muted: #59636e;
      --line: #d1d9e0;
      --code-bg: #f6f8fa;
      --accent: #0969da;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Pretendard", "Noto Sans KR", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    h1, h2, h3, h4 {
      line-height: 1.3;
      margin-top: 1.8em;
      margin-bottom: 0.6em;
      font-weight: 700;
    }
    h1 { font-size: 2em; border-bottom: 1px solid var(--line); padding-bottom: 0.3em; }
    h2 { font-size: 1.5em; border-bottom: 1px solid var(--line); padding-bottom: 0.3em; }
    h3 { font-size: 1.2em; }
    h4 { font-size: 1.05em; color: var(--muted); }
    p, ul, ol { margin: 0.6em 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 2.4em 0;
    }
    code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
    }
    pre {
      background: var(--code-bg);
      padding: 14px 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.9em;
      line-height: 1.5;
    }
    pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }
    blockquote {
      margin: 1em 0;
      padding: 0.4em 1em;
      color: var(--muted);
      border-left: 4px solid var(--line);
      background: #fafbfc;
    }
    table {
      border-collapse: collapse;
      margin: 1em 0;
      width: 100%;
      font-size: 0.95em;
      display: block;
      overflow-x: auto;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--code-bg); font-weight: 600; }
    img { max-width: 100%; }
    .mermaid {
      background: transparent;
      text-align: center;
      margin: 1.4em 0;
      padding: 8px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .mermaid svg {
      max-width: 100%;
      height: auto;
    }
    .loading {
      color: var(--muted);
      text-align: center;
      padding: 80px 20px;
      font-size: 0.95em;
    }
    .error {
      color: #cf222e;
      background: #ffebe9;
      border: 1px solid #ffcecb;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <main id="content">
    <div class="loading">불러오는 중…</div>
  </main>

  <script type="module">
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js";
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.esm.min.mjs";

    mermaid.initialize({
      startOnLoad: false,
      theme: "default",
      securityLevel: "loose",
      fontFamily: 'inherit',
      flowchart: { curve: "basis", htmlLabels: true },
      mindmap: { padding: 16 }
    });

    const renderer = new marked.Renderer();
    const baseCode = renderer.code.bind(renderer);
    renderer.code = function (code, infostring, escaped) {
      const lang = (infostring || "").trim().split(/\s+/)[0].toLowerCase();
      if (lang === "mermaid") {
        const safe = String(code)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        return `<div class="mermaid">${safe}</div>`;
      }
      return baseCode(code, infostring, escaped);
    };
    marked.setOptions({ renderer, gfm: true, breaks: false });

    const content = document.getElementById("content");

    try {
      const res = await fetch("./Week1-Recap.md", { cache: "no-cache" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();
      const html = marked.parse(md);
      content.innerHTML = html;
      await mermaid.run({ querySelector: ".mermaid" });
    } catch (err) {
      content.innerHTML = `<div class="error">문서를 불러오지 못했습니다: ${err.message}</div>`;
    }
  </script>
</body>
</html>

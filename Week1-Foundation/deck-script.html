<!doctype html>

  <style>
    :root { --bg:#fff; --text:#111; --muted:#666; --line:#e8e8e8; --accent:#f7f7f7; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }
    .wrap { height: 100vh; display: grid; grid-template-rows: auto auto 1fr auto; }
    .top {
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top .breadcrumb {
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }
    .title {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      font-size: 22px;
      font-weight: 700;
    }
    .body {
      margin: 0;
      padding: 24px 20px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 28px;
      overflow: auto;
    }
    .body.placeholder {
      color: var(--muted);
      font-style: italic;
    }
    .controls {
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      align-items: center;
    }
    button {
      border: 1px solid #111;
      background: #fff;
      color: #111;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:disabled {
      border-color: var(--line);
      color: var(--muted);
      cursor: not-allowed;
    }
    .controls .spacer { flex: 1; }
    .hint { font-size: 12px; color: var(--muted); }
  </style>
</head>

      const meta = SLIDE_META[currentIndex] || { section: 0, title: "" };
      const sectionLabel = SECTION_LABELS[meta.section] || "";

      progressEl.textContent = `슬라이드 ${currentIndex + 1} / ${DISPLAY_ORDER.length}`;
      titleEl.textContent = `슬라이드 ${currentIndex + 1} — ${meta.title}`;
      crumbEl.textContent = `W1 Foundation › ${sectionLabel} › ${meta.title}`;

      const text = scripts[currentIndex];
      bodyEl.textContent = text || "[ 강사 스크립트를 여기에 작성하세요 ]";
      bodyEl.classList.toggle("placeholder", !text);

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === DISPLAY_ORDER.length - 1;
    }

    function send(type, index) {
      if (!channel) return;
      const payload = { type };
      if (typeof index === "number") payload.index = index;
      channel.postMessage(payload);
    }

    prevBtn.addEventListener("click", () => send("slide-prev"));
    nextBtn.addEventListener("click", () => send("slide-next"));

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowDown" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        send("slide-next");
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowUp" || event.key === "PageUp") {
        event.preventDefault();
        send("slide-prev");
      }
    });

    try {
      const savedIndex = Number(localStorage.getItem(STORAGE_KEY));
      if (Number.isInteger(savedIndex) && savedIndex >= 0 && savedIndex < DISPLAY_ORDER.length) {
        currentIndex = savedIndex;
      }
    } catch (error) { /* noop */ }

    try {
      channel = new BroadcastChannel(SYNC_CHANNEL_NAME);
      channel.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || typeof data !== "object") return;
        if (data.type === "slide-change") {
          const index = Number(data.index);
          if (Number.isInteger(index) && index >= 0 && index < DISPLAY_ORDER.length) {
            currentIndex = index;
            render();
          }
        }
      });
    } catch (error) { /* noop */ }

    render();
  </script>
</body>
</html>
